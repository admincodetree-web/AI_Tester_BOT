services:
  - type: web
    name: tester-app-v2
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        value: ""
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: GEMINI_USE_API
        value: "false"